  <rect x="80" y="460" width="320" height="60" rx="30" fill="#F97316"/>
  <text x="240" y="499" font-family="Arial, sans-serif" font-size="24" font-weight="600" text-anchor="middle" fill="white">Tap to add contact →</text>

  <!-- URL -->
  <text x="80" y="580" font-family="Arial, sans-serif" font-size="22" fill="#CBD5E1">atithi-v2.vercel.app</text>
</svg>
