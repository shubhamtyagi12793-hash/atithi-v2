<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1200" height="630" fill="#FFF7ED"/>
  <!-- Gradient blob -->
  <circle cx="1100" cy="100" r="300" fill="#FFEDD5" opacity="0.8"/>
  <circle cx="100" cy="550" r="250" fill="#FEE2E2" opacity="0.6"/>

  <!-- Logo circle -->
  <rect x="80" y="200" width="96" height="96" rx="24" fill="#F97316"/>
  <text x="128" y="261" font-family="Arial" font-size="48" text-anchor="middle" fill="white">✨</text>

  <!-- App name -->
  <text x="200" y="258" font-family="Arial, sans-serif" font-size="64" font-weight="700" fill="#1E293B">Atithi</text>

  <!-- Tagline -->
  <text x="80" y="340" font-family="Arial, sans-serif" font-size="36" fill="#64748B">🎂 Someone shared a birthday with you!</text>

  <!-- Description -->
  <text x="80" y="410" font-family="Arial, sans-serif" font-size="28" fill="#94A3B8">Track birthdays · Find perfect gifts · Never miss a moment</text>

